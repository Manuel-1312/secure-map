name: Face 2 — Calidad

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run ruff
        run: ruff check core ui tests
      - name: Run pytest
        run: pytest tests
